<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Token Continent — AI & LLM Token Intelligence" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@tokencontinentai" />
    <meta name="twitter:title" content="Token Continent — AI & LLM Token Intelligence" />
    <meta name="twitter:description" content="Independent daily coverage of AI token economics, LLM research, and GPU infrastructure." />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "Token Continent",
      "url": "https://www.tokencontinent.com",
      "logo": "https://www.tokencontinent.com/favicon.svg",
      "description": "Independent daily intelligence platform for AI tokens, large language models, and GPU infrastructure.",
      "sameAs": [
        "https://twitter.com/tokencontinentai",
        "https://youtube.com/@tokencontinentai",
        "https://linkedin.com/company/tokencontinentai",
        "https://instagram.com/tokencontinentai",
        "https://discord.gg/tokencontinentai"
      ]
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Token Continent",
      "url": "https://www.tokencontinent.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.tokencontinent.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Google Fonts: Space Grotesk + Source Serif 4 + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
