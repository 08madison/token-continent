# Token Continent - Production Docker Compose
# 
# Quick Start:
#   1. docker-compose -f docker-compose.prod.yml up -d --build
#   2. Access at http://localhost:3000
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!
version: '3.4'
services:
  token-continent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: token-continent
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:${DB_PASSWORD:-TokenContinent2024!}@postgres:5432/token-continent
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:-TokenContinent2024!}@redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=token-continent-node-1
      - SESSION_SECRET=${SESSION_SECRET:-change_this_random_string_in_production}
    depends_on:
      - redis
      - postgres
    networks:
      - token-continent-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: tc-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-TokenContinent2024!}"]
    networks:
      - token-continent-network

  postgres:
    image: postgres:15
    container_name: tc-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD:-TokenContinent2024!}
      POSTGRES_DB: token-continent
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - token-continent-network

volumes:
  pg_data:

networks:
  token-continent-network:
    driver: bridge
